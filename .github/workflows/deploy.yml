name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Trigger build & deploy only when pushing to the main branch
  workflow_dispatch:  # Allow triggering the workflow manually via the Actions tab

# Set permissions for the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrency issues (like multiple simultaneous runs trying to deploy)
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Application (Vite compiler)
        run: npm run build

      - name: Upload Static Web Assets Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite outputs all compiled web assets securely into the /dist folder
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
